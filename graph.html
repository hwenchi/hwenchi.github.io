<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Graph — Wenqi He</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f11; font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden; }
    svg { width: 100vw; height: 100vh; }
    .link { stroke: #333; stroke-width: 1px; }
    .node { cursor: pointer; }
    .node:active { cursor: grabbing; }
    .node text {
      font-size: 10px;
      fill: #bbb;
      pointer-events: none;
      dominant-baseline: central;
    }
    #legend {
      position: fixed;
      top: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #888;
      cursor: pointer;
      padding: 3px 8px;
      border-radius: 4px;
      transition: background 0.15s;
      user-select: none;
    }
    .legend-item:hover { background: rgba(255,255,255,0.05); color: #ccc; }
    .legend-item.active { color: #fff; background: rgba(255,255,255,0.08); }
    .legend-swatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    #tooltip {
      position: fixed;
      background: rgba(15,15,17,0.95);
      border: 1px solid #2a2a2e;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 11px;
      color: #eee;
      pointer-events: none;
      display: none;
      max-width: 220px;
      line-height: 1.6;
    }
    #tooltip .name { font-weight: 600; font-size: 12px; margin-bottom: 4px; }
    #tooltip .tags { display: flex; flex-wrap: wrap; gap: 4px; }
    #tooltip .tag {
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      color: #000;
      font-weight: 500;
    }
  </style>
</head>
<body>
<svg id="svg"></svg>
<div id="legend"></div>
<div style="position:fixed;bottom:16px;right:16px;font-size:11px;color:#444;">Generated by Claude</div>
<div id="tooltip"><div class="name"></div><div class="tags"></div></div>
<script type="module">
import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

const TAGS = {
  "UI":               "#60a5fa",
  "2D Graphics":      "#38bdf8",
  "3D Rendering":     "#f97316",
  "GPU":              "#ef4444",
  "Simulation":       "#facc15",
  "Geospatial":       "#34d399",
  "Medical":          "#a78bfa",
  "Chemical":         "#f472b6",
  "Math":             "#fb923c",
  "Literate":         "#cbd5e1",
  "Computer Vision":  "#e879f9",
  "CS Foundations":   "#94a3b8",
  "Networking":       "#64748b",
  "Statistical & ML": "#a3a3a3",
};

const nodes = [
  { id: "replay",                   tags: ["UI", "2D Graphics"] },
  { id: "gui-first-principles",     tags: ["UI", "2D Graphics", "Literate"] },
  { id: "michelangelo",             tags: ["UI", "2D Graphics"] },
  { id: "vector-rendering",         tags: ["2D Graphics"] },
  { id: "svg.c",                    tags: ["2D Graphics"] },
  { id: "newton-vg",                tags: ["2D Graphics", "GPU"] },
  { id: "cpu-raytracer",            tags: ["3D Rendering"] },
  { id: "gl-raytracer",             tags: ["3D Rendering", "GPU"] },
  { id: "3d-rasterizer",            tags: ["3D Rendering"] },
  { id: "gl-fdm-2d",               tags: ["Simulation", "GPU"] },
  { id: "gl-fdm-3d",               tags: ["Simulation", "3D Rendering", "GPU"] },
  { id: "wasm-particle-sim",        tags: ["Simulation"] },
  { id: "wasm-fvm-cfd",            tags: ["Simulation", "GPU"] },
  { id: "hillshade",                tags: ["Geospatial", "3D Rendering", "GPU"] },
  { id: "shortcut-to-graphics",     tags: ["Geospatial", "3D Rendering", "Literate"] },
  { id: "terrain-faulting",         tags: ["Geospatial", "Simulation"] },
  { id: "oblique-mercator",         tags: ["Geospatial", "3D Rendering"] },
  { id: "raster-tile-renderer",     tags: ["Geospatial", "2D Graphics"] },
  { id: "vector-tiles-gl",          tags: ["Geospatial", "2D Graphics", "GPU"] },
  { id: "visible-human-explore",    tags: ["Medical", "Literate"] },
  { id: "visible-human-vtk",        tags: ["Medical"] },
  { id: "visible-human-slicer",     tags: ["Medical"] },
  { id: "visible-human-volume",     tags: ["Medical", "3D Rendering", "GPU"] },
  { id: "scivis-primer",            tags: ["Simulation"] },
  { id: "shape-from-shading",       tags: ["Math", "3D Rendering", "Computer Vision"] },
  { id: "mol-renderer",             tags: ["Chemical"] },
  { id: "conformer-viewer",         tags: ["Chemical"] },
  { id: "spectral-color",           tags: ["Chemical", "Math"] },
  { id: "qft-viz",                  tags: ["Math"] },
  { id: "backprop",                 tags: ["Math", "Literate", "Statistical & ML"] },
  { id: "gpu-patterns",             tags: ["GPU"] },
  { id: "tinyvm",                   tags: ["CS Foundations"] },
  { id: "tinyos",                   tags: ["CS Foundations"] },
  { id: "universal-turing-machine", tags: ["CS Foundations"] },
  { id: "kanbun-lang",              tags: ["CS Foundations"] },
  { id: "plato",                    tags: ["Statistical & ML"] },
  { id: "tidal-sphere",             tags: ["Simulation", "3D Rendering"] },
  { id: "macrobook",                tags: ["CS Foundations"] },
  { id: "telescope",                tags: ["Networking"] },
  { id: "wormhole",                 tags: ["Networking"] },
];

const edges = [
  // UI & 2D Graphics internal
  ["replay","gui-first-principles"],["replay","michelangelo"],
  ["gui-first-principles","michelangelo"],["gui-first-principles","vector-rendering"],
  ["gui-first-principles","svg.c"],["michelangelo","vector-rendering"],
  ["michelangelo","svg.c"],["michelangelo","newton-vg"],
  ["vector-rendering","svg.c"],["vector-rendering","newton-vg"],["svg.c","newton-vg"],
  // 3D Rendering internal
  ["cpu-raytracer","gl-raytracer"],["cpu-raytracer","3d-rasterizer"],
  // Simulation internal
  ["gl-fdm-2d","gl-fdm-3d"],["gl-fdm-2d","wasm-particle-sim"],["gl-fdm-2d","wasm-fvm-cfd"],
  ["gl-fdm-3d","wasm-particle-sim"],["gl-fdm-3d","wasm-fvm-cfd"],["wasm-particle-sim","wasm-fvm-cfd"],
  // Geospatial internal
  ["hillshade","shortcut-to-graphics"],["oblique-mercator","raster-tile-renderer"],["oblique-mercator","vector-tiles-gl"],
  // Medical internal
  ["visible-human-explore","visible-human-vtk"],["visible-human-explore","scivis-primer"],
  ["visible-human-vtk","visible-human-slicer"],["visible-human-vtk","visible-human-volume"],["visible-human-vtk","scivis-primer"],
  // Chemical internal
  ["mol-renderer","conformer-viewer"],
  // Math internal
  ["shape-from-shading","qft-viz"],["shape-from-shading","backprop"],["qft-viz","backprop"],
  // CS Foundations internal
  ["tinyvm","tinyos"],["tinyvm","kanbun-lang"],["tinyvm","macrobook"],
  ["tinyos","universal-turing-machine"],["universal-turing-machine","kanbun-lang"],["universal-turing-machine","macrobook"],
  ["telescope","wormhole"],["tinyos","telescope"],
  // UI ↔ 3D Rendering
  ["vector-rendering","3d-rasterizer"],["svg.c","cpu-raytracer"],["svg.c","3d-rasterizer"],["newton-vg","3d-rasterizer"],
  // UI ↔ Geospatial
  ["michelangelo","raster-tile-renderer"],["newton-vg","vector-tiles-gl"],
  // UI ↔ CS Foundations
  ["replay","kanbun-lang"],["gui-first-principles","tinyos"],["gui-first-principles","kanbun-lang"],
  ["gui-first-principles","telescope"],["michelangelo","telescope"],
  // 3D Rendering ↔ Simulation
  ["gl-raytracer","gl-fdm-2d"],["gl-raytracer","gl-fdm-3d"],
  ["3d-rasterizer","gl-fdm-2d"],["3d-rasterizer","wasm-particle-sim"],
  // 3D Rendering ↔ Geospatial
  ["gl-raytracer","hillshade"],["gl-raytracer","shortcut-to-graphics"],
  ["gl-raytracer","oblique-mercator"],["gl-fdm-3d","oblique-mercator"],
  // 3D Rendering ↔ Medical
  ["gl-raytracer","visible-human-volume"],
  // 3D Rendering ↔ GPU
  ["gl-raytracer","gpu-patterns"],["gl-fdm-3d","gpu-patterns"],["oblique-mercator","gpu-patterns"],
  // 3D Rendering ↔ misc
  ["cpu-raytracer","wasm-particle-sim"],["3d-rasterizer","terrain-faulting"],
  ["3d-rasterizer","vector-tiles-gl"],["3d-rasterizer","visible-human-slicer"],
  ["3d-rasterizer","mol-renderer"],["3d-rasterizer","tidal-sphere"],["gl-fdm-2d","tidal-sphere"],
  // Simulation ↔ Geospatial
  ["gl-fdm-2d","terrain-faulting"],["gl-fdm-3d","hillshade"],["gl-fdm-3d","shortcut-to-graphics"],
  ["gl-fdm-3d","terrain-faulting"],["wasm-fvm-cfd","hillshade"],["wasm-fvm-cfd","shortcut-to-graphics"],
  ["wasm-fvm-cfd","terrain-faulting"],["wasm-fvm-cfd","raster-tile-renderer"],
  // Simulation ↔ Medical
  ["gl-fdm-2d","visible-human-vtk"],["gl-fdm-3d","visible-human-explore"],["gl-fdm-3d","conformer-viewer"],
  // Simulation ↔ Math
  ["wasm-fvm-cfd","shape-from-shading"],["wasm-fvm-cfd","spectral-color"],
  ["wasm-fvm-cfd","qft-viz"],["wasm-fvm-cfd","backprop"],
  // Geospatial internal cross
  ["hillshade","oblique-mercator"],
  // Geospatial ↔ Medical
  ["oblique-mercator","visible-human-volume"],
  // Geospatial ↔ Math
  ["hillshade","shape-from-shading"],
  ["shortcut-to-graphics","shape-from-shading"],["shortcut-to-graphics","spectral-color"],
  ["shortcut-to-graphics","qft-viz"],["shortcut-to-graphics","backprop"],
  ["shortcut-to-graphics","visible-human-explore"],
  // Geospatial ↔ misc
  ["terrain-faulting","tidal-sphere"],
  // Medical ↔ Math
  ["visible-human-explore","backprop"],
  // Statistical & ML
  ["plato","backprop"],
  // CS Foundations ↔ Networking
  ["tinyos","telescope"],
];

const links = edges.map(([s, t]) => ({ source: s, target: t }));

const svg = d3.select("#svg");
const W = window.innerWidth, H = window.innerHeight;
const g = svg.append("g");

svg.call(d3.zoom().scaleExtent([0.1, 5]).on("zoom", e => g.attr("transform", e.transform)));

const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d => d.id).distance(90))
  .force("charge", d3.forceManyBody().strength(-350))
  .force("center", d3.forceCenter(W / 2, H / 2))
  .force("collision", d3.forceCollide(28));

const link = g.append("g").selectAll("line")
  .data(links).join("line").attr("class", "link");

const R = 9;
const arc = d3.arc().innerRadius(0).outerRadius(R);
const pie = d3.pie().value(() => 1).sort(null);

const tooltip = document.getElementById("tooltip");
const ttName = tooltip.querySelector(".name");
const ttTags = tooltip.querySelector(".tags");

const node = g.append("g").selectAll("g")
  .data(nodes).join("g").attr("class", "node")
  .call(d3.drag()
    .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on("drag",  (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on("end",   (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }))
  .on("click", (e, d) => {
    window.open(`https://github.com/GalMunGral/${d.id}`, "_blank");
  })
  .on("mouseover", (e, d) => {
    tooltip.style.display = "block";
    ttName.textContent = d.id;
    ttTags.innerHTML = d.tags.map(t =>
      `<span class="tag" style="background:${TAGS[t]}">${t}</span>`
    ).join("");
  })
  .on("mousemove", e => {
    tooltip.style.left = (e.clientX + 14) + "px";
    tooltip.style.top  = (e.clientY - 10) + "px";
  })
  .on("mouseout", () => { tooltip.style.display = "none"; });

node.each(function(d) {
  const slices = pie(d.tags);
  d3.select(this).selectAll("path")
    .data(slices).join("path")
    .attr("d", arc)
    .attr("fill", (s, i) => TAGS[d.tags[i]])
    .attr("stroke", "#0f0f11")
    .attr("stroke-width", 0.5);
});

node.append("circle")
  .attr("r", R)
  .attr("fill", "none")
  .attr("stroke", "#555")
  .attr("stroke-width", 0.5);

node.append("text").text(d => d.id).attr("x", R + 4);

simulation.on("tick", () => {
  link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  node.attr("transform", d => `translate(${d.x},${d.y})`);
});

// Legend with filter
let activeTag = null;
const legend = document.getElementById("legend");
Object.entries(TAGS).forEach(([tag, color]) => {
  const item = document.createElement("div");
  item.className = "legend-item";
  item.innerHTML = `<div class="legend-swatch" style="background:${color}"></div>${tag}`;
  item.onclick = () => {
    if (activeTag === tag) {
      activeTag = null;
      item.classList.remove("active");
      node.style("opacity", 1);
      link.style("opacity", 1);
    } else {
      activeTag = tag;
      document.querySelectorAll(".legend-item").forEach(el => el.classList.remove("active"));
      item.classList.add("active");
      node.style("opacity", d => d.tags.includes(tag) ? 1 : 0.08);
      link.style("opacity", d =>
        d.source.tags.includes(tag) && d.target.tags.includes(tag) ? 1 : 0.04
      );
    }
  };
  legend.appendChild(item);
});
</script>
</body>
</html>
