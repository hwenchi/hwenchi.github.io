<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Wenqi He</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f11; font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden; }
    svg { width: 100vw; height: 100vh; }
    .link { stroke: #333; }
    .node { cursor: pointer; }
    .node:active { cursor: grabbing; }
    .node text { font-size: 10px; fill: #bbb; pointer-events: none; dominant-baseline: central; }
    #legend {
      position: fixed; top: 20px; left: 20px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: #666; cursor: pointer;
      padding: 3px 8px; border-radius: 4px;
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }
    .legend-item:hover { background: rgba(255,255,255,0.05); color: #ccc; }
    .legend-item.active { color: #fff; background: rgba(255,255,255,0.08); }
    .legend-swatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    #tooltip {
      position: fixed; display: none;
      background: rgba(15,15,17,0.95); border: 1px solid #2a2a2e;
      border-radius: 8px; padding: 8px 12px;
      font-size: 11px; color: #eee; pointer-events: none;
      max-width: 240px; line-height: 1.6;
    }
    #tooltip .name { font-weight: 600; font-size: 12px; margin-bottom: 5px; }
    #tooltip .tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag { padding: 1px 6px; border-radius: 3px; font-size: 10px; color: #000; font-weight: 500; }
    #attr { position: fixed; bottom: 14px; right: 16px; font-size: 11px; color: #333; }
  </style>
</head>
<body>
<svg id="svg"></svg>
<div id="legend"></div>
<div id="tooltip"><div class="name"></div><div class="tags"></div></div>
<div id="attr">Generated by Claude</div>
<script type="module">
import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
import { TAGS, NODES, CONNECTIONS } from "./data.js";

// Colors follow a semantic spectrum: adjacent hues = related topics
// Visual computing (blue→cyan→orange→red): UI, 2D Graphics, 3D Rendering, GPU
// Physics (yellow→green): Simulation, Geospatial
// Applied viz (teal→pink): Medical, Chemical
// Abstract (purple→violet): Math, Computer Vision, Statistical & ML
// Systems (slate): CS Foundations, Networking
// Cross-cutting (light gray): Literate
const TAG_COLORS = {
  "UI":               "hsl(210,75%,65%)",
  "2D Graphics":      "hsl(190,70%,58%)",
  "3D Rendering":     "hsl(25,88%,58%)",
  "GPU":              "hsl(0,78%,62%)",
  "Simulation":       "hsl(48,88%,58%)",
  "Geospatial":       "hsl(152,62%,52%)",
  "Medical":          "hsl(175,62%,50%)",
  "Chemical":         "hsl(330,70%,65%)",
  "Math":             "hsl(270,60%,67%)",
  "Computer Vision":  "hsl(300,62%,63%)",
  "Statistical & ML": "hsl(245,55%,67%)",
  "CS Foundations":   "hsl(220,16%,58%)",
  "Networking":       "hsl(220,16%,42%)",
  "Literate":         "hsl(0,0%,76%)",
};

// Flatten edges, tracking whether each is within-cluster or cross-cluster
const edgeSet = new Set();
const links = [];
for (const [group, pairs] of Object.entries(CONNECTIONS)) {
  const isCross = group.includes("—");
  for (const [s, t, rating] of pairs) {
    const key = [s, t].sort().join("|||");
    if (!edgeSet.has(key)) {
      edgeSet.add(key);
      links.push({ source: s, target: t, cross: isCross, rating });
    }
  }
}

const W = window.innerWidth, H = window.innerHeight;
const svg = d3.select("#svg");
const g = svg.append("g");

svg.call(d3.zoom().scaleExtent([0.1, 5]).on("zoom", e => g.attr("transform", e.transform)));

// Target positions per primary tag (x, y) as fractions of viewport
// Left-bottom = PL & Systems; top-right = Visualization
const CLUSTER_POS = {
  "CS Foundations":   [0.08, 0.80],
  "Networking":       [0.08, 0.65],
  "Statistical & ML": [0.85, 0.20],
  "UI":               [0.25, 0.45],
  "2D Graphics":      [0.30, 0.35],
  "3D Rendering":     [0.40, 0.30],
  "GPU":              [0.45, 0.40],
  "Simulation":       [0.55, 0.45],
  "Geospatial":       [0.65, 0.55],
  "Medical":          [0.75, 0.55],
  "Chemical":         [0.80, 0.65],
  "Math":             [0.80, 0.35],
  "Computer Vision":  [0.75, 0.30],
  "Literate":         [0.30, 0.55],
};

const CORNER_PULL = {
  "CS Foundations": [0.08, 0.85],
  "Networking":     [0.08, 0.85],
  "Statistical & ML": [0.92, 0.08],
};

function clusterForce(alpha) {
  for (const d of NODES) {
    const pos = CORNER_PULL[d.tags[0]];
    if (!pos) continue;
    d.vx += (pos[0] * W - d.x) * alpha * 0.15;
    d.vy += (pos[1] * H - d.y) * alpha * 0.15;
  }
}

const PAD = 80;
function boundForce() {
  for (const d of NODES) {
    if (d.x < PAD)      d.vx += (PAD - d.x) * 0.1;
    if (d.x > W - PAD)  d.vx -= (d.x - (W - PAD)) * 0.1;
    if (d.y < PAD)      d.vy += (PAD - d.y) * 0.1;
    if (d.y > H - PAD)  d.vy -= (d.y - (H - PAD)) * 0.1;
  }
}

const simulation = d3.forceSimulation(NODES)
  .force("link", d3.forceLink(links).id(d => d.id)
    .distance(d => d.cross ? 160 : 65)
    .strength(d => (d.cross ? 0.3 : 0.8) * (d.rating / 3)))
  .force("charge", d3.forceManyBody().strength(-280))
  .force("center", d3.forceCenter(W / 2, H / 2))
  .force("collision", d3.forceCollide(26))
  .force("bound", boundForce)
  .force("cluster", clusterForce);

const R = 9;
const pie = d3.pie().sort(null).value(() => 1);
const arc = d3.arc().innerRadius(0).outerRadius(R);

const link = g.append("g").selectAll("line")
  .data(links).join("line").attr("class", "link")
  .attr("stroke-width", d => d.rating * 0.5);

const tooltip = document.getElementById("tooltip");
const ttName = tooltip.querySelector(".name");
const ttTags = tooltip.querySelector(".tags");

const node = g.append("g").selectAll("g")
  .data(NODES).join("g").attr("class", "node")
  .call(d3.drag()
    .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on("drag",  (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on("end",   (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }))
  .on("click", (e, d) => { window.open(`https://github.com/GalMunGral/${d.id}`, "_blank"); })
  .on("mouseover", (e, d) => {
    tooltip.style.display = "block";
    ttName.textContent = d.id;
    ttTags.innerHTML = d.tags.map(t =>
      `<span class="tag" style="background:${TAG_COLORS[t]}">${t}</span>`
    ).join("");
  })
  .on("mousemove", e => {
    tooltip.style.left = (e.clientX + 14) + "px";
    tooltip.style.top  = (e.clientY - 10) + "px";
  })
  .on("mouseout", () => { tooltip.style.display = "none"; });

node.each(function(d) {
  d3.select(this).selectAll("path")
    .data(pie(d.tags))
    .join("path")
    .attr("d", arc)
    .attr("fill", s => TAG_COLORS[d.tags[s.index]])
    .attr("stroke", "#1a1a1d")
    .attr("stroke-width", 0.5);
});
node.append("text").text(d => d.id).attr("x", R + 4);

simulation.on("tick", () => {
  link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  node.attr("transform", d => `translate(${d.x},${d.y})`);
});

// Legend with tag filter
let activeTag = null;
const legend = document.getElementById("legend");
TAGS.forEach(tag => { const color = TAG_COLORS[tag];
  const item = document.createElement("div");
  item.className = "legend-item";
  item.innerHTML = `<div class="legend-swatch" style="background:${color}"></div>${tag}`;
  item.onclick = () => {
    if (activeTag === tag) {
      activeTag = null;
      item.classList.remove("active");
      node.style("opacity", 1);
      link.style("opacity", 1);
    } else {
      activeTag = tag;
      document.querySelectorAll(".legend-item").forEach(el => el.classList.remove("active"));
      item.classList.add("active");
      node.style("opacity", d => d.tags.includes(tag) ? 1 : 0.07);
      link.style("opacity", d =>
        d.source.tags.includes(tag) && d.target.tags.includes(tag) ? 1 : 0.03
      );
    }
  };
  legend.appendChild(item);
});
</script>
</body>
</html>
